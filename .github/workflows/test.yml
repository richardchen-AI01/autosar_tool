name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  pytest:
    name: pytest (${{ matrix.os }} / py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ['3.10', '3.11']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install jinja2 lxml pytest

      - name: Run pytest
        run: |
          PYTHONPATH=core:. python -m pytest core/tests generator/tests validator/tests -q

  memif_full:
    name: MemIf full-stack regression (M2.7)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install jinja2 lxml

      - name: tools/test_memif_full.sh
        run: |
          chmod +x tools/test_memif_full.sh
          ./tools/test_memif_full.sh

  pyinstaller:
    name: PyInstaller smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install jinja2 lxml pyinstaller

      - name: Build bswgen + bswval (unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x tools/build_all.sh
          ./tools/build_all.sh

      - name: Build bswgen + bswval (windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: tools\build_all.cmd

      - name: Smoke-test bswgen binary (unix)
        if: runner.os != 'Windows'
        run: |
          ./build/dist/bswgen -g MemIf -i samples/Demo_S32K148 -o /tmp/ci_smoke
          test -f /tmp/ci_smoke/MemIf_Cfg.h
          test -f /tmp/ci_smoke/MemIf_Cfg.c
          test -f /tmp/ci_smoke/MemIf_Bswmd.arxml

      - name: Smoke-test bswgen binary (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./build/dist/bswgen.exe -g MemIf -i samples/Demo_S32K148 -o $env:TEMP/ci_smoke
          if (-not (Test-Path "$env:TEMP/ci_smoke/MemIf_Cfg.h")) { exit 1 }
          if (-not (Test-Path "$env:TEMP/ci_smoke/MemIf_Cfg.c")) { exit 1 }
          if (-not (Test-Path "$env:TEMP/ci_smoke/MemIf_Bswmd.arxml")) { exit 1 }
